services:
  - type: web
    name: third-shot-app
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 8 --bind 0.0.0.0:$PORT backend.wsgi:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: AUTO_CREATE_DB
        value: "true"
      - key: AUTO_SEED_COURTS
        value: "true"
