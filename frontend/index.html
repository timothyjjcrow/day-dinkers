<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#14532d" />
  <title>Third Shot — Find courts, friends & games</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon-512.png" type="image/png" />
  <link rel="apple-touch-icon" href="icon-512.png" />
</head>
<body>
  <div id="app">
    <!-- Auth screen -->
    <section id="auth-screen" class="screen hidden">
      <div class="auth-card">
        <img src="logo.jpg" alt="Third Shot" class="auth-logo-img" />
        <p class="auth-tagline">Find courts. Meet players. Get on the court.</p>
        <form id="auth-form">
          <input type="text" id="auth-name" placeholder="Display name" autocomplete="name" class="hidden" />
          <input type="email" id="auth-email" placeholder="Email" autocomplete="email" required />
          <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" required minlength="6" />
          <p id="auth-error" class="form-error hidden"></p>
          <button type="submit" class="btn btn-primary btn-block" id="auth-submit">Log in</button>
        </form>
        <button class="btn-link" id="auth-toggle">New here? Create an account</button>
      </div>
    </section>

    <!-- Main app -->
    <main id="main-screen" class="screen hidden">
      <!-- Courts tab -->
      <section id="tab-courts" class="tab-panel">
        <div id="map"></div>
        <div class="map-topbar">
          <input type="search" id="court-search" placeholder="Search courts or cities…" />
          <button id="locate-btn" class="icon-btn" title="My location"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" x2="5" y1="12" y2="12"/><line x1="19" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="5"/><line x1="12" x2="12" y1="19" y2="22"/><circle cx="12" cy="12" r="7"/></svg></button>
          <button id="bell-btn" class="icon-btn" title="Activity" style="position:relative"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></svg><span id="bell-badge" class="badge hidden" style="top:4px;right:4px"></span></button>
        </div>
        <div class="map-filters" id="map-filters">
          <button data-filter="all" class="active">All</button>
          <button data-filter="active">🟢 Playing now</button>
          <button data-filter="lighted">💡 Lighted</button>
          <button data-filter="indoor">🏠 Indoor</button>
        </div>
        <div id="presence-banner" class="presence-banner hidden"></div>
        <button id="list-toggle" class="pill-btn">☰ List</button>
        <div id="court-list" class="sheet hidden">
          <div class="sheet-handle"></div>
          <h3 class="sheet-title">Courts in view</h3>
          <div id="court-list-items"></div>
        </div>
      </section>

      <!-- Play tab -->
      <section id="tab-play" class="tab-panel hidden">
        <header class="tab-header">
          <h2>Play</h2>
          <div class="segmented" id="play-segments">
            <button data-seg="games" class="active">Games</button>
            <button data-seg="scores">Scores</button>
          </div>
        </header>
        <div id="play-content" class="tab-scroll"></div>
        <button id="new-game-fab" class="fab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
      </section>

      <!-- Chat tab -->
      <section id="tab-chat" class="tab-panel hidden">
        <header class="tab-header">
          <h2>People</h2>
          <div class="segmented" id="chat-segments">
            <button data-seg="chats" class="active">Chats</button>
            <button data-seg="friends">Friends</button>
            <button data-seg="nearby">Nearby</button>
          </div>
        </header>
        <div id="chat-content" class="tab-scroll"></div>
      </section>

      <!-- Profile tab -->
      <section id="tab-profile" class="tab-panel hidden">
        <header class="tab-header"><h2>Profile</h2></header>
        <div id="profile-content" class="tab-scroll"></div>
      </section>

      <!-- Active game banner (docked above the nav) -->
      <button id="active-game-banner" class="active-game-banner hidden"></button>

      <!-- Bottom navigation -->
      <nav id="bottom-nav">
        <button data-tab="courts" class="nav-btn active"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"/><path d="M15 5.764v15"/><path d="M9 3.236v15"/></svg></span>Courts</button>
        <button data-tab="play" class="nav-btn"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg></span>Play<span id="play-badge" class="badge hidden"></span></button>
        <button data-tab="chat" class="nav-btn"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg></span>Chat<span id="chat-badge" class="badge hidden"></span></button>
        <button data-tab="profile" class="nav-btn"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>Profile</button>
      </nav>
    </main>

    <!-- Overlays -->
    <div id="overlay-root"></div>
    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
