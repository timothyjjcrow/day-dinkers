<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#14532d" />
  <title>Picklepals — Find courts, friends & games</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🥒</text></svg>" />
</head>
<body>
  <div id="app">
    <!-- Auth screen -->
    <section id="auth-screen" class="screen hidden">
      <div class="auth-card">
        <div class="auth-logo">🥒</div>
        <h1>Picklepals</h1>
        <p class="auth-tagline">Find courts. Meet players. Get on the court.</p>
        <form id="auth-form">
          <input type="text" id="auth-name" placeholder="Display name" autocomplete="name" class="hidden" />
          <input type="email" id="auth-email" placeholder="Email" autocomplete="email" required />
          <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" required minlength="6" />
          <p id="auth-error" class="form-error hidden"></p>
          <button type="submit" class="btn btn-primary btn-block" id="auth-submit">Log in</button>
        </form>
        <button class="btn-link" id="auth-toggle">New here? Create an account</button>
      </div>
    </section>

    <!-- Main app -->
    <main id="main-screen" class="screen hidden">
      <!-- Courts tab -->
      <section id="tab-courts" class="tab-panel">
        <div id="map"></div>
        <div class="map-topbar">
          <input type="search" id="court-search" placeholder="Search courts or cities…" />
          <button id="locate-btn" class="icon-btn" title="My location">📍</button>
        </div>
        <div id="presence-banner" class="presence-banner hidden"></div>
        <button id="list-toggle" class="pill-btn">☰ List</button>
        <div id="court-list" class="sheet hidden">
          <div class="sheet-handle"></div>
          <h3 class="sheet-title">Courts in view</h3>
          <div id="court-list-items"></div>
        </div>
      </section>

      <!-- Play tab -->
      <section id="tab-play" class="tab-panel hidden">
        <header class="tab-header">
          <h2>Play</h2>
          <div class="segmented" id="play-segments">
            <button data-seg="nearby" class="active">Nearby</button>
            <button data-seg="mine">Mine</button>
            <button data-seg="results">Results</button>
            <button data-seg="rankings">Top</button>
          </div>
        </header>
        <div id="play-content" class="tab-scroll"></div>
        <button id="new-game-fab" class="fab">＋</button>
      </section>

      <!-- Chat tab -->
      <section id="tab-chat" class="tab-panel hidden">
        <header class="tab-header">
          <h2>People</h2>
          <div class="segmented" id="chat-segments">
            <button data-seg="chats" class="active">Chats</button>
            <button data-seg="friends">Friends</button>
          </div>
        </header>
        <div id="chat-content" class="tab-scroll"></div>
      </section>

      <!-- Profile tab -->
      <section id="tab-profile" class="tab-panel hidden">
        <header class="tab-header"><h2>Profile</h2></header>
        <div id="profile-content" class="tab-scroll"></div>
      </section>

      <!-- Bottom navigation -->
      <nav id="bottom-nav">
        <button data-tab="courts" class="nav-btn active"><span class="nav-icon">🗺️</span>Courts</button>
        <button data-tab="play" class="nav-btn"><span class="nav-icon">🎾</span>Play<span id="play-badge" class="badge hidden"></span></button>
        <button data-tab="chat" class="nav-btn"><span class="nav-icon">💬</span>Chat<span id="chat-badge" class="badge hidden"></span></button>
        <button data-tab="profile" class="nav-btn"><span class="nav-icon">👤</span>Profile</button>
      </nav>
    </main>

    <!-- Overlays -->
    <div id="overlay-root"></div>
    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
